<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Blower Duel Plinko — Diagram</title>
<!-- screenshot: 1200x1900 -->
<style>
  body { margin: 0; padding: 0; background: #0a0e1a; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1200" height="1900"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// Colors
const BG = '#0a0e1a';
const MILWAUKEE_RED = '#DB0032';
const MESH_GREEN = 'rgba(100,200,100,0.35)';
const MESH_LINE = 'rgba(100,200,100,0.5)';
const PEG_COLOR = '#8B7355';
const GOLD = '#FFD700';
const ORANGE = '#FF8C00';
const WHITE = '#FFFFFF';
const GRAY = '#666666';
const LIGHT_GRAY = '#AAAAAA';
const DARK_GRAY = '#333333';
const YELLOW = '#FFDD44';
const BALL_RED = '#FF2244';
const BALL_BLACK = '#222222';
const CYAN = '#44CCEE';
const AIR_BLUE = 'rgba(100,180,255,0.4)';

ctx.fillStyle = BG;
ctx.fillRect(0, 0, 1200, 1900);

// ============================================================
// TITLE
// ============================================================
ctx.fillStyle = MILWAUKEE_RED;
ctx.font = 'bold 38px Arial';
ctx.textAlign = 'center';
ctx.fillText('BLOWER DUEL PLINKO', 600, 48);
ctx.fillStyle = LIGHT_GRAY;
ctx.font = '16px Arial';
ctx.fillText('Aim at the Board to Score — or Aim at Your Opponent\'s FACE to Sabotage', 600, 74);

// ============================================================
// FRONT VIEW (left side — main view)
// ============================================================
const FV_X = 60;
const FV_Y = 120;
const FV_W = 480;
const FV_H = 640;

ctx.fillStyle = WHITE;
ctx.font = 'bold 18px Arial';
ctx.textAlign = 'center';
ctx.fillText('FRONT VIEW (Red Player\'s Side)', FV_X + FV_W/2, FV_Y - 15);

// Board background — dark but with mesh hint
ctx.fillStyle = '#0e1422';
ctx.fillRect(FV_X, FV_Y, FV_W, FV_H);

// Mesh grid pattern (the key visual — this isn't solid, it's open)
ctx.strokeStyle = MESH_LINE;
ctx.lineWidth = 0.5;
ctx.globalAlpha = 0.15;
for (let gx = FV_X; gx <= FV_X + FV_W; gx += 12) {
  ctx.beginPath();
  ctx.moveTo(gx, FV_Y); ctx.lineTo(gx, FV_Y + FV_H);
  ctx.stroke();
}
for (let gy = FV_Y; gy <= FV_Y + FV_H; gy += 12) {
  ctx.beginPath();
  ctx.moveTo(FV_X, gy); ctx.lineTo(FV_X + FV_W, gy);
  ctx.stroke();
}
ctx.globalAlpha = 1.0;

// Frame (2x4 lumber — thick red border)
ctx.strokeStyle = MILWAUKEE_RED;
ctx.lineWidth = 10;
ctx.strokeRect(FV_X, FV_Y, FV_W, FV_H);

// Zone sidebar
const zoneX = FV_X + FV_W + 14;
ctx.fillStyle = 'rgba(100,200,100,0.1)';
ctx.fillRect(FV_X + 2, FV_Y + 2, FV_W - 4, FV_H * 0.12);
ctx.fillStyle = 'rgba(100,200,100,0.6)';
ctx.font = '11px Arial';
ctx.textAlign = 'left';
ctx.fillText('DROP ZONE', zoneX, FV_Y + FV_H * 0.06);

ctx.fillStyle = 'rgba(139,115,85,0.06)';
ctx.fillRect(FV_X + 2, FV_Y + FV_H * 0.12, FV_W - 4, FV_H * 0.68);
ctx.fillStyle = 'rgba(139,115,85,0.6)';
ctx.fillText('PEG FIELD', zoneX, FV_Y + FV_H * 0.46);
ctx.fillText('(OPEN MESH)', zoneX, FV_Y + FV_H * 0.49);

ctx.fillStyle = 'rgba(255,215,0,0.06)';
ctx.fillRect(FV_X + 2, FV_Y + FV_H * 0.80, FV_W - 4, FV_H * 0.20);
ctx.fillStyle = 'rgba(255,215,0,0.6)';
ctx.fillText('SCORING ZONE', zoneX, FV_Y + FV_H * 0.90);

// ---- DROP SLOTS (top) ----
const dropSlotY = FV_Y - 2;
const dropPositions = [FV_X + FV_W * 0.25, FV_X + FV_W * 0.5, FV_X + FV_W * 0.75];
dropPositions.forEach((dx, i) => {
  ctx.fillStyle = MILWAUKEE_RED;
  ctx.fillRect(dx - 16, dropSlotY, 32, 20);
  ctx.fillStyle = WHITE;
  ctx.font = '9px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('DROP ' + (i+1), dx, dropSlotY + 14);
});

// ---- PEG FIELD ----
const pegStartY = FV_Y + FV_H * 0.15;
const pegEndY = FV_Y + FV_H * 0.77;
const pegRows = 10;
const pegCols = 8;
const pegSpacingY = (pegEndY - pegStartY) / (pegRows - 1);
const pegSpacingX = (FV_W - 70) / (pegCols - 1);

for (let row = 0; row < pegRows; row++) {
  const offset = (row % 2 === 0) ? 0 : pegSpacingX / 2;
  const cols = (row % 2 === 0) ? pegCols : pegCols - 1;
  for (let col = 0; col < cols; col++) {
    const px = FV_X + 35 + col * pegSpacingX + offset;
    const py = pegStartY + row * pegSpacingY;
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fillStyle = PEG_COLOR;
    ctx.fill();
    ctx.strokeStyle = '#6B5335';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// ---- AIR PORTS (2 per side) ----
const leftPorts = [
  { label: 'LOW', y: FV_Y + FV_H * 0.65 },
  { label: 'HIGH', y: FV_Y + FV_H * 0.30 }
];
const rightPorts = [
  { label: 'LOW', y: FV_Y + FV_H * 0.65 },
  { label: 'HIGH', y: FV_Y + FV_H * 0.30 }
];

// Left ports (Red player)
leftPorts.forEach(p => {
  ctx.beginPath();
  ctx.arc(FV_X, p.y, 16, 0, Math.PI * 2);
  ctx.fillStyle = MILWAUKEE_RED;
  ctx.fill();
  ctx.strokeStyle = '#FF4466';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(FV_X, p.y, 8, 0, Math.PI * 2);
  ctx.fillStyle = DARK_GRAY;
  ctx.fill();
  ctx.fillStyle = MILWAUKEE_RED;
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(p.label, FV_X - 22, p.y + 4);
});

// Right ports (Black player)
rightPorts.forEach(p => {
  ctx.beginPath();
  ctx.arc(FV_X + FV_W, p.y, 16, 0, Math.PI * 2);
  ctx.fillStyle = '#444';
  ctx.fill();
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(FV_X + FV_W, p.y, 8, 0, Math.PI * 2);
  ctx.fillStyle = DARK_GRAY;
  ctx.fill();
  ctx.fillStyle = '#888';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(p.label, FV_X + FV_W + 22, p.y + 4);
});

// ---- AIR BLAST from Red player's HIGH port (scoring mode) ----
ctx.save();
ctx.globalAlpha = 0.3;
const blastX = FV_X + 16;
const blastY = FV_Y + FV_H * 0.30;
const blGrad = ctx.createLinearGradient(blastX, blastY, blastX + FV_W * 0.55, blastY);
blGrad.addColorStop(0, MILWAUKEE_RED);
blGrad.addColorStop(1, 'rgba(219,0,50,0)');
ctx.fillStyle = blGrad;
ctx.beginPath();
ctx.moveTo(blastX, blastY - 5);
ctx.lineTo(blastX + FV_W * 0.55, blastY - 22);
ctx.lineTo(blastX + FV_W * 0.55, blastY + 22);
ctx.lineTo(blastX, blastY + 5);
ctx.closePath();
ctx.fill();
ctx.restore();

ctx.fillStyle = 'rgba(255,100,100,0.7)';
ctx.font = 'italic 10px Arial';
ctx.textAlign = 'center';
ctx.fillText('AIR BLAST → STEER BALL', blastX + FV_W * 0.25, blastY - 16);

// Red ball being steered
const rbx = FV_X + FV_W * 0.35;
const rby = blastY + 8;
ctx.save();
ctx.globalAlpha = 0.15;
ctx.beginPath(); ctx.arc(rbx - 16, rby + 12, 9, 0, Math.PI*2);
ctx.fillStyle = BALL_RED; ctx.fill();
ctx.restore();
ctx.beginPath(); ctx.arc(rbx, rby, 10, 0, Math.PI*2);
ctx.fillStyle = BALL_RED; ctx.fill();
ctx.strokeStyle = '#CC0020'; ctx.lineWidth = 1.5; ctx.stroke();

// Black ball falling on opponent's side
const bbx = FV_X + FV_W * 0.72;
const bby = FV_Y + FV_H * 0.48;
ctx.beginPath(); ctx.arc(bbx, bby, 10, 0, Math.PI*2);
ctx.fillStyle = BALL_BLACK; ctx.fill();
ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5; ctx.stroke();
ctx.save();
ctx.globalAlpha = 0.12;
ctx.beginPath(); ctx.arc(bbx + 5, bby - 20, 9, 0, Math.PI*2);
ctx.fillStyle = BALL_BLACK; ctx.fill();
ctx.restore();

// ---- FACE BLAST ZONE (above the board!) ----
// Show the arc of air going OVER the board
ctx.save();
ctx.setLineDash([8, 6]);
ctx.strokeStyle = 'rgba(255, 150, 50, 0.6)';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.moveTo(FV_X - 40, FV_Y - 20);
ctx.quadraticCurveTo(FV_X + FV_W/2, FV_Y - 80, FV_X + FV_W + 40, FV_Y - 20);
ctx.stroke();
ctx.setLineDash([]);
ctx.restore();

// Arrow at end
ctx.fillStyle = 'rgba(255, 150, 50, 0.7)';
ctx.beginPath();
ctx.moveTo(FV_X + FV_W + 40, FV_Y - 20);
ctx.lineTo(FV_X + FV_W + 30, FV_Y - 30);
ctx.lineTo(FV_X + FV_W + 30, FV_Y - 10);
ctx.closePath();
ctx.fill();

ctx.fillStyle = ORANGE;
ctx.font = 'bold 13px Arial';
ctx.textAlign = 'center';
ctx.fillText('⚡ FACE BLAST ZONE ⚡', FV_X + FV_W/2, FV_Y - 55);
ctx.fillStyle = 'rgba(255,150,50,0.7)';
ctx.font = '10px Arial';
ctx.fillText('Aim OVER the board → blast opponent\'s face!', FV_X + FV_W/2, FV_Y - 40);

// ---- BLOWERS (both sides) ----
// Red player blower (left)
const blwLX = FV_X - 110;
const blwLY = FV_Y + FV_H * 0.25;
ctx.save();
ctx.translate(blwLX, blwLY);
ctx.rotate(-0.05);
ctx.fillStyle = MILWAUKEE_RED;
ctx.fillRect(0, 0, 70, 28);
ctx.fillStyle = '#222';
ctx.fillRect(15, 28, 20, 35);
ctx.fillStyle = '#333';
ctx.fillRect(70, 6, 30, 16);
ctx.fillStyle = WHITE;
ctx.font = 'bold 8px Arial';
ctx.textAlign = 'center';
ctx.fillText('M18', 35, 18);
ctx.restore();

// Tether
ctx.strokeStyle = 'rgba(255,255,255,0.25)';
ctx.lineWidth = 1.5;
ctx.setLineDash([5, 4]);
ctx.beginPath();
ctx.moveTo(blwLX + 30, blwLY + 60);
ctx.quadraticCurveTo(blwLX, blwLY + 120, FV_X - 10, FV_Y + FV_H * 0.50);
ctx.stroke();
ctx.setLineDash([]);

ctx.fillStyle = MILWAUKEE_RED;
ctx.font = 'bold 13px Arial';
ctx.textAlign = 'center';
ctx.fillText('RED PLAYER', blwLX + 40, blwLY - 18);

// Stick figure (Red player)
const rfX = blwLX + 20;
const rfY = blwLY + 90;
ctx.strokeStyle = MILWAUKEE_RED;
ctx.lineWidth = 2;
// head
ctx.beginPath(); ctx.arc(rfX, rfY, 10, 0, Math.PI*2); ctx.stroke();
// body
ctx.beginPath(); ctx.moveTo(rfX, rfY+10); ctx.lineTo(rfX, rfY+45); ctx.stroke();
// legs
ctx.beginPath(); ctx.moveTo(rfX, rfY+45); ctx.lineTo(rfX-12, rfY+65); ctx.stroke();
ctx.beginPath(); ctx.moveTo(rfX, rfY+45); ctx.lineTo(rfX+12, rfY+65); ctx.stroke();
// arms — reaching toward blower
ctx.beginPath(); ctx.moveTo(rfX, rfY+20); ctx.lineTo(rfX+30, rfY+5); ctx.stroke();
ctx.beginPath(); ctx.moveTo(rfX, rfY+25); ctx.lineTo(rfX+25, rfY+15); ctx.stroke();

// Black player blower (right)
const blwRX = FV_X + FV_W + 40;
const blwRY = FV_Y + FV_H * 0.60;
ctx.save();
ctx.translate(blwRX + 100, blwRY);
ctx.scale(-1, 1);
ctx.rotate(-0.05);
ctx.fillStyle = MILWAUKEE_RED;
ctx.fillRect(0, 0, 70, 28);
ctx.fillStyle = '#222';
ctx.fillRect(15, 28, 20, 35);
ctx.fillStyle = '#333';
ctx.fillRect(70, 6, 30, 16);
ctx.fillStyle = WHITE;
ctx.font = 'bold 8px Arial';
ctx.textAlign = 'center';
ctx.fillText('M18', 35, 18);
ctx.restore();

ctx.fillStyle = '#AAA';
ctx.font = 'bold 13px Arial';
ctx.textAlign = 'center';
ctx.fillText('BLACK PLAYER', blwRX + 50, blwRY - 18);

// Stick figure (Black player)
const bfX = blwRX + 80;
const bfY = blwRY + 90;
ctx.strokeStyle = '#AAA';
ctx.lineWidth = 2;
ctx.beginPath(); ctx.arc(bfX, bfY, 10, 0, Math.PI*2); ctx.stroke();
ctx.beginPath(); ctx.moveTo(bfX, bfY+10); ctx.lineTo(bfX, bfY+45); ctx.stroke();
ctx.beginPath(); ctx.moveTo(bfX, bfY+45); ctx.lineTo(bfX-12, bfY+65); ctx.stroke();
ctx.beginPath(); ctx.moveTo(bfX, bfY+45); ctx.lineTo(bfX+12, bfY+65); ctx.stroke();
ctx.beginPath(); ctx.moveTo(bfX, bfY+20); ctx.lineTo(bfX-30, bfY+5); ctx.stroke();
ctx.beginPath(); ctx.moveTo(bfX, bfY+25); ctx.lineTo(bfX-25, bfY+15); ctx.stroke();

// ---- SCORING POCKETS (bottom) ----
const pocketY = FV_Y + FV_H - 60;
const pocketH = 55;
const pockets = [
  { label: '0', w: 0.08, color: '#1a1a1a', textColor: GRAY },
  { label: '10', w: 0.12, color: '#2a2a3a', textColor: WHITE },
  { label: '25', w: 0.10, color: '#3a3020', textColor: YELLOW },
  { label: '50', w: 0.08, color: '#3a2510', textColor: ORANGE },
  { label: '100', w: 0.06, color: '#4a0015', textColor: MILWAUKEE_RED },
  { label: '50', w: 0.08, color: '#3a2510', textColor: ORANGE },
  { label: '25', w: 0.10, color: '#3a3020', textColor: YELLOW },
  { label: '10', w: 0.12, color: '#2a2a3a', textColor: WHITE },
  { label: '0', w: 0.08, color: '#1a1a1a', textColor: GRAY },
];

const totalW = pockets.reduce((s, p) => s + p.w, 0);
let pocketX = FV_X + 5;
const usableW = FV_W - 10;

pockets.forEach(p => {
  const pw = (p.w / totalW) * usableW;
  ctx.fillStyle = p.color;
  ctx.fillRect(pocketX, pocketY, pw, pocketH);
  ctx.strokeStyle = MILWAUKEE_RED;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(pocketX, pocketY); ctx.lineTo(pocketX, pocketY + pocketH);
  ctx.stroke();
  ctx.fillStyle = p.textColor;
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(p.label, pocketX + pw/2, pocketY + 24);
  ctx.font = '9px Arial';
  ctx.fillText('pts', pocketX + pw/2, pocketY + 37);
  pocketX += pw;
});
ctx.strokeStyle = MILWAUKEE_RED; ctx.lineWidth = 2;
ctx.beginPath(); ctx.moveTo(pocketX, pocketY); ctx.lineTo(pocketX, pocketY + pocketH); ctx.stroke();

ctx.fillStyle = MILWAUKEE_RED;
ctx.font = 'bold 11px Arial';
ctx.textAlign = 'center';
ctx.fillText('JACKPOT', FV_X + FV_W/2, pocketY - 6);

// Board title
ctx.fillStyle = MILWAUKEE_RED;
ctx.font = 'bold 20px Arial';
ctx.textAlign = 'center';
ctx.fillText('BLOWER', FV_X + FV_W/2, FV_Y + 28);
ctx.fillText('DUEL', FV_X + FV_W/2, FV_Y + 50);

// ---- TOWER LIGHT ----
const tlX = FV_X + FV_W/2;
const tlY = FV_Y - 85;
ctx.fillStyle = MILWAUKEE_RED;
ctx.fillRect(tlX - 3, tlY + 10, 6, 30);
ctx.fillStyle = MILWAUKEE_RED;
ctx.fillRect(tlX - 10, tlY - 5, 20, 15);
ctx.save();
ctx.globalAlpha = 0.2;
const glGrad = ctx.createRadialGradient(tlX, tlY + 2, 4, tlX, tlY + 2, 35);
glGrad.addColorStop(0, GOLD);
glGrad.addColorStop(1, 'rgba(255,215,0,0)');
ctx.fillStyle = glGrad;
ctx.beginPath(); ctx.arc(tlX, tlY + 2, 35, 0, Math.PI*2); ctx.fill();
ctx.restore();
ctx.fillStyle = GOLD;
ctx.font = '9px Arial';
ctx.textAlign = 'center';
ctx.fillText('M18 TOWER LIGHT', tlX, tlY - 12);

// ---- DIMENSION LINES ----
ctx.strokeStyle = 'rgba(255,255,255,0.35)';
ctx.fillStyle = 'rgba(255,255,255,0.5)';
ctx.lineWidth = 1;
ctx.font = '10px Arial';

// Width
const dimY = FV_Y + FV_H + 25;
ctx.beginPath(); ctx.moveTo(FV_X, dimY); ctx.lineTo(FV_X + FV_W, dimY); ctx.stroke();
ctx.beginPath(); ctx.moveTo(FV_X, dimY-5); ctx.lineTo(FV_X, dimY+5); ctx.stroke();
ctx.beginPath(); ctx.moveTo(FV_X+FV_W, dimY-5); ctx.lineTo(FV_X+FV_W, dimY+5); ctx.stroke();
ctx.textAlign = 'center';
ctx.fillText('48" (4 ft)', FV_X + FV_W/2, dimY + 15);

// Height
const dimX = FV_X - 25;
ctx.beginPath(); ctx.moveTo(dimX, FV_Y); ctx.lineTo(dimX, FV_Y+FV_H); ctx.stroke();
ctx.beginPath(); ctx.moveTo(dimX-5, FV_Y); ctx.lineTo(dimX+5, FV_Y); ctx.stroke();
ctx.beginPath(); ctx.moveTo(dimX-5, FV_Y+FV_H); ctx.lineTo(dimX+5, FV_Y+FV_H); ctx.stroke();
ctx.save();
ctx.translate(dimX - 10, FV_Y + FV_H/2);
ctx.rotate(-Math.PI/2);
ctx.textAlign = 'center';
ctx.fillText('60" (5 ft)', 0, 0);
ctx.restore();

// ============================================================
// TOP-DOWN VIEW (right side — shows the DUEL dynamic)
// ============================================================
const TV_X = 660;
const TV_Y = 120;
const TV_W = 480;
const TV_H = 350;

ctx.fillStyle = WHITE;
ctx.font = 'bold 18px Arial';
ctx.textAlign = 'center';
ctx.fillText('TOP-DOWN VIEW (The Duel Dynamic)', TV_X + TV_W/2, TV_Y - 15);

// Playing field (top-down = width × depth)
const boardTopX = TV_X + 100;
const boardTopY = TV_Y + 120;
const boardTopW = TV_W - 200; // 48" width
const boardTopD = 40;         // 4" depth (exaggerated)

// Player zones
// Red player (top/near)
ctx.fillStyle = 'rgba(219,0,50,0.08)';
ctx.fillRect(TV_X + 40, TV_Y + 10, TV_W - 80, 100);
ctx.fillStyle = MILWAUKEE_RED;
ctx.font = 'bold 14px Arial';
ctx.textAlign = 'center';
ctx.fillText('RED PLAYER ZONE', TV_X + TV_W/2, TV_Y + 30);

// Black player (bottom/far)
ctx.fillStyle = 'rgba(150,150,150,0.08)';
ctx.fillRect(TV_X + 40, TV_Y + 200, TV_W - 80, 100);
ctx.fillStyle = '#AAA';
ctx.font = 'bold 14px Arial';
ctx.fillText('BLACK PLAYER ZONE', TV_X + TV_W/2, TV_Y + 280);

// The board (top-down — thin rectangle)
ctx.fillStyle = '#2a2015';
ctx.fillRect(boardTopX, boardTopY, boardTopW, boardTopD);
// Mesh pattern on board
ctx.strokeStyle = MESH_LINE;
ctx.lineWidth = 0.5;
for (let mx = boardTopX; mx <= boardTopX + boardTopW; mx += 8) {
  ctx.beginPath();
  ctx.moveTo(mx, boardTopY); ctx.lineTo(mx, boardTopY + boardTopD);
  ctx.stroke();
}
ctx.strokeStyle = MILWAUKEE_RED;
ctx.lineWidth = 3;
ctx.strokeRect(boardTopX, boardTopY, boardTopW, boardTopD);

ctx.fillStyle = WHITE;
ctx.font = 'bold 10px Arial';
ctx.textAlign = 'center';
ctx.fillText('BOARD (OPEN MESH)', TV_X + TV_W/2, boardTopY + boardTopD/2 + 4);

// Pegs shown as dots (top-down)
for (let px = boardTopX + 20; px < boardTopX + boardTopW; px += 35) {
  ctx.beginPath();
  ctx.arc(px, boardTopY + boardTopD/2, 3, 0, Math.PI*2);
  ctx.fillStyle = PEG_COLOR;
  ctx.fill();
}

// Air ports (shown as openings in the board frame sides)
// Left ports
ctx.fillStyle = MILWAUKEE_RED;
ctx.fillRect(boardTopX - 8, boardTopY + 5, 8, 12);
ctx.fillRect(boardTopX - 8, boardTopY + boardTopD - 17, 8, 12);
// Right ports
ctx.fillStyle = '#555';
ctx.fillRect(boardTopX + boardTopW, boardTopY + 5, 8, 12);
ctx.fillRect(boardTopX + boardTopW, boardTopY + boardTopD - 17, 8, 12);

// ---- THE THREE BLAST OPTIONS (top-down) ----

// Option 1: Red player blasts through port → steers own ball
ctx.save();
ctx.globalAlpha = 0.35;
const opt1Grad = ctx.createLinearGradient(boardTopX - 30, boardTopY + 10, boardTopX + boardTopW * 0.4, boardTopY + 10);
opt1Grad.addColorStop(0, MILWAUKEE_RED);
opt1Grad.addColorStop(1, 'rgba(219,0,50,0)');
ctx.fillStyle = opt1Grad;
ctx.beginPath();
ctx.moveTo(boardTopX - 30, boardTopY + 6);
ctx.lineTo(boardTopX + boardTopW * 0.4, boardTopY);
ctx.lineTo(boardTopX + boardTopW * 0.4, boardTopY + boardTopD);
ctx.lineTo(boardTopX - 30, boardTopY + 20);
ctx.closePath();
ctx.fill();
ctx.restore();

// Label
ctx.fillStyle = MILWAUKEE_RED;
ctx.font = 'bold 10px Arial';
ctx.textAlign = 'right';
ctx.fillText('① STEER', boardTopX - 35, boardTopY + 10);
ctx.fillStyle = 'rgba(255,100,100,0.7)';
ctx.font = '9px Arial';
ctx.fillText('(Air port → own ball)', boardTopX - 35, boardTopY + 22);

// Option 2: Red player blasts THROUGH MESH → hits opponent's ball
ctx.save();
ctx.globalAlpha = 0.25;
const opt2Grad = ctx.createLinearGradient(boardTopX + boardTopW * 0.3, boardTopY + boardTopD, boardTopX + boardTopW * 0.3, boardTopY + boardTopD + 80);
opt2Grad.addColorStop(0, CYAN);
opt2Grad.addColorStop(1, 'rgba(68,204,238,0)');
ctx.fillStyle = opt2Grad;
ctx.beginPath();
ctx.moveTo(boardTopX + boardTopW * 0.25, boardTopY + boardTopD);
