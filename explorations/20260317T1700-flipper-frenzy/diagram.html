<!DOCTYPE html>
<!-- screenshot: 900x1900 -->
<html>
<head>
<meta charset="utf-8">
<title>FLIPPER FRENZY — The Portable Pinball Riot</title>
<style>
  body { margin: 0; padding: 0; background: #0a0e1a; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="900" height="1900"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// Colors
const COL = {
  bg: '#0a0e1a',
  pegboard: '#1a1a1a',
  pegboardEdge: '#333',
  polycarb: 'rgba(135,206,250,0.15)',
  polycarbEdge: 'rgba(135,206,250,0.5)',
  pvc: '#888',
  pvcJoint: '#ff8800',
  pegGreen: '#39ff14',
  pegOrange: '#ff6600',
  pegPink: '#ff1493',
  pegBlue: '#00bfff',
  spinnerYellow: '#ffdd00',
  spinnerArm: '#ffee44',
  chimeTube: '#b0c4de',
  chimeGlow: 'rgba(176,196,222,0.3)',
  warpPurple: '#bf40ff',
  warpGlow: 'rgba(191,64,255,0.25)',
  magazine: '#556b2f',
  magazineEdge: '#6b8e23',
  bucket100: '#ffd700',
  bucket50: '#ff8c00',
  bucket25: '#c0c0c0',
  bucket10: '#8b7355',
  flipperP1L: '#ff3333',
  flipperP1R: '#ff6666',
  flipperP2L: '#3388ff',
  flipperP2R: '#66aaff',
  ball1: '#ff4444',
  ball2: '#4488ff',
  ballNeon: '#39ff14',
  gutter: '#333',
  divider: '#666',
  dim: '#888',
  label: '#ccc',
  title: '#fff',
  specs: '#aaa',
  brakeCable: '#ffcc00',
  brakeHandle: '#cc8800',
  chute: '#555',
  deathGap: '#440000',
};

// ---- BACKGROUND ----
ctx.fillStyle = COL.bg;
ctx.fillRect(0, 0, 900, 1900);

// ---- TITLE ----
ctx.fillStyle = COL.title;
ctx.font = 'bold 24px monospace';
ctx.textAlign = 'center';
ctx.fillText('FLIPPER FRENZY', 450, 30);
ctx.font = 'bold 14px monospace';
ctx.fillStyle = COL.warpPurple;
ctx.fillText('The Portable Pinball Riot', 450, 50);
ctx.font = '11px monospace';
ctx.fillStyle = COL.specs;
ctx.fillText('48"W \u00d7 65"H \u00d7 4" deep  |  ~33 lbs  |  10-min assembly  |  Zero tools  |  ~$225', 450, 68);

// ---- FRONT VIEW ----
const FX = 30, FY = 100, FW = 520, FH = 750;

ctx.fillStyle = COL.label;
ctx.font = 'bold 14px monospace';
ctx.textAlign = 'center';
ctx.fillText('FRONT VIEW (Player Perspective)', FX + FW/2, FY - 8);

// PVC Frame
ctx.strokeStyle = COL.pvc;
ctx.lineWidth = 6;
ctx.strokeRect(FX, FY, FW, FH);

// Magazine crossbar at top
ctx.strokeStyle = COL.pvc;
ctx.lineWidth = 4;
ctx.beginPath();
ctx.moveTo(FX, FY - 30);
ctx.lineTo(FX + FW, FY - 30);
ctx.stroke();

// Magazine uprights
ctx.beginPath();
ctx.moveTo(FX, FY); ctx.lineTo(FX, FY - 30);
ctx.moveTo(FX + FW, FY); ctx.lineTo(FX + FW, FY - 30);
ctx.stroke();

// Corner joints
const jointR = 10;
[[FX,FY],[FX+FW,FY],[FX,FY+FH],[FX+FW,FY+FH],[FX,FY-30],[FX+FW,FY-30]].forEach(([x,y]) => {
  ctx.fillStyle = COL.pvcJoint;
  ctx.beginPath(); ctx.arc(x,y,jointR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '5px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SNAP', x, y+2);
});

// Pegboard background
ctx.fillStyle = COL.pegboard;
ctx.fillRect(FX+8, FY+8, FW-16, FH-16);

// Pegboard holes (subtle dots)
ctx.fillStyle = '#222';
for (let py = FY+20; py < FY+FH-10; py += 12) {
  for (let px = FX+20; px < FX+FW-10; px += 12) {
    ctx.beginPath(); ctx.arc(px, py, 1.2, 0, Math.PI*2); ctx.fill();
  }
}

// ---- BALL MAGAZINE (top) ----
const magY = FY + 10;
const magH = 35;
ctx.fillStyle = COL.magazine;
ctx.globalAlpha = 0.5;
ctx.fillRect(FX + 20, magY, FW - 40, magH);
ctx.globalAlpha = 1;
ctx.strokeStyle = COL.magazineEdge;
ctx.lineWidth = 2;
ctx.strokeRect(FX + 20, magY, FW - 40, magH);

// Balls in magazine
const magBallColors = [COL.ball1, COL.ballNeon, COL.ball2, COL.pegOrange, COL.ball1, COL.ballNeon, COL.ball2, COL.pegPink, COL.ball1, COL.ballNeon, COL.ball2, COL.pegOrange];
magBallColors.forEach((col, i) => {
  const bx = FX + 50 + i * 37;
  const by = magY + magH/2;
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(bx, by, 8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.arc(bx-2, by-2, 3, 0, Math.PI*2); ctx.fill();
});

ctx.fillStyle = COL.magazineEdge;
ctx.font = 'bold 9px monospace';
ctx.textAlign = 'center';
ctx.fillText('BALL MAGAZINE \u2014 Auto-feeds every ~5 sec', FX + FW/2, magY - 5);

// Feed slot indicators
ctx.fillStyle = COL.magazineEdge;
ctx.fillRect(FX + FW/4 - 8, magY + magH, 16, 8);
ctx.fillRect(FX + 3*FW/4 - 8, magY + magH, 16, 8);
ctx.fillStyle = '#fff';
ctx.font = '6px monospace';
ctx.fillText('DROP', FX + FW/4, magY + magH + 5);
ctx.fillText('DROP', FX + 3*FW/4, magY + magH + 5);

// Feed trajectory arrows
ctx.strokeStyle = COL.magazineEdge;
ctx.lineWidth = 1.5;
ctx.setLineDash([3,3]);
[FX + FW/4, FX + 3*FW/4].forEach(fx => {
  ctx.beginPath();
  ctx.moveTo(fx, magY + magH + 8);
  ctx.lineTo(fx, magY + magH + 35);
  ctx.stroke();
  // Arrow head
  ctx.fillStyle = COL.magazineEdge;
  ctx.beginPath();
  ctx.moveTo(fx - 4, magY + magH + 30);
  ctx.lineTo(fx + 4, magY + magH + 30);
  ctx.lineTo(fx, magY + magH + 38);
  ctx.fill();
});
ctx.setLineDash([]);

// ---- PEG FIELD (static + spinners + chimes) ----
const pegStartY = FY + 110;
const pegEndY = FY + FH - 210;
const pegSpaceX = 38;
const pegSpaceY = 34;
const pegColors = [COL.pegGreen, COL.pegOrange, COL.pegPink, COL.pegBlue];

let pegRow = 0;
let pegIndex = 0;
for (let py = pegStartY; py < pegEndY; py += pegSpaceY) {
  const offset = (pegRow % 2 === 0) ? 0 : pegSpaceX / 2;
  const color = pegColors[pegRow % 4];
  for (let px = FX + 50 + offset; px < FX + FW - 40; px += pegSpaceX) {
    const isSpinner = (pegIndex % 4 === 2); // every 4th peg
    const isChime = (pegIndex % 7 === 5) && !isSpinner; // every ~7th peg, not a spinner

    if (isSpinner) {
      // SPINNER PEG — four-armed windmill
      ctx.save();
      ctx.translate(px, py);
      // Glow
      ctx.shadowColor = COL.spinnerYellow;
      ctx.shadowBlur = 6;
      // Hub
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
      // Arms (rotated slightly from cardinal)
      ctx.shadowBlur = 0;
      const armRotation = (pegIndex * 0.7) % (Math.PI * 2); // pseudo-random rotation per spinner
      for (let a = 0; a < 4; a++) {
        const angle = armRotation + a * Math.PI/2;
        ctx.fillStyle = COL.spinnerYellow;
        ctx.save();
        ctx.rotate(angle);
        ctx.fillRect(-2, -2, 12, 4);
        // Cup at tip
        ctx.fillStyle = COL.spinnerArm;
        ctx.beginPath(); ctx.arc(11, 0, 3, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
      // Ghost position (rotated 30deg)
      ctx.globalAlpha = 0.2;
      for (let a = 0; a < 4; a++) {
        const angle = armRotation + a * Math.PI/2 + 0.5;
        ctx.fillStyle = COL.spinnerYellow;
        ctx.save();
        ctx.rotate(angle);
        ctx.fillRect(-2, -2, 12, 4);
        ctx.restore();
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    } else if (isChime) {
      // CHIME PEG — peg with glow ring
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath(); ctx.arc(px+1, py+1, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = COL.chimeTube;
      ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI*2); ctx.fill();
      // Glow ring (sound indicator)
      ctx.strokeStyle = COL.chimeGlow;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(px, py, 10, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(px, py, 14, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.arc(px, py, 18, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.arc(px-2, py-2, 2, 0, Math.PI*2); ctx.fill();
    } else {
      // STATIC PEG
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath(); ctx.arc(px+1, py+1, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.arc(px-2, py-2, 2, 0, Math.PI*2); ctx.fill();
    }
    pegIndex++;
  }
  pegRow++;
}

// ---- WARP ZONE ----
const warpX = FX + FW/2;
const warpY = FY + FH/2 - 20;
const warpR = 22;

// Glow effect
const warpGrad = ctx.createRadialGradient(warpX, warpY, warpR, warpX, warpY, warpR * 2.5);
warpGrad.addColorStop(0, 'rgba(191,64,255,0.3)');
warpGrad.addColorStop(1, 'rgba(191,64,255,0)');
ctx.fillStyle = warpGrad;
ctx.beginPath(); ctx.arc(warpX, warpY, warpR * 2.5, 0, Math.PI*2); ctx.fill();

// Tunnel ring
ctx.strokeStyle = COL.warpPurple;
ctx.lineWidth = 4;
ctx.beginPath(); ctx.arc(warpX, warpY, warpR, 0, Math.PI*2); ctx.stroke();

// Inner ring
ctx.strokeStyle = 'rgba(191,64,255,0.5)';
ctx.lineWidth = 2;
ctx.beginPath(); ctx.arc(warpX, warpY, warpR - 6, 0, Math.PI*2); ctx.stroke();

// Swirl effect inside
ctx.strokeStyle = 'rgba(191,64,255,0.4)';
ctx.lineWidth = 1.5;
ctx.beginPath();
ctx.arc(warpX, warpY, 12, 0, Math.PI * 1.2);
ctx.stroke();
ctx.beginPath();
ctx.arc(warpX, warpY, 8, Math.PI, Math.PI * 2.2);
ctx.stroke();

// Label
ctx.fillStyle = COL.warpPurple;
ctx.font = 'bold 10px monospace';
ctx.textAlign = 'center';
ctx.fillText('WARP ZONE', warpX, warpY - warpR - 12);
ctx.font = '8px monospace';
ctx.fillText('Balls cross to', warpX, warpY - warpR - 2);
ctx.fillText('other player\'s side!', warpX, warpY + warpR + 12);

// Warp trajectory arrows
ctx.strokeStyle = COL.warpPurple;
ctx.lineWidth = 1.5;
ctx.setLineDash([4,4]);
// Ball going left to right through warp
ctx.beginPath();
ctx.moveTo(warpX - 60, warpY - 30);
ctx.quadraticCurveTo(warpX - 20, warpY, warpX, warpY);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(warpX, warpY);
ctx.quadraticCurveTo(warpX + 20, warpY, warpX + 60, warpY + 30);
ctx.stroke();
ctx.setLineDash([]);
// Arrow heads
ctx.fillStyle = COL.warpPurple;
ctx.beginPath();
ctx.moveTo(warpX + 55, warpY + 22);
ctx.lineTo(warpX + 65, warpY + 28);
ctx.lineTo(warpX + 55, warpY + 35);
ctx.fill();

// ---- SCORING BUCKETS ----
function drawBucket(x, y, w, h, color, label) {
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.7;
  ctx.fillRect(x, y, w, h);
  ctx.globalAlpha = 1;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, 3);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(label, x + w/2, y + h/2 + 3);
}

// Jackpot — top center (below warp zone)
drawBucket(FX + FW/2 - 30, warpY + 60, 60, 28, COL.bucket100, 'JACKPOT 100');

// 50 pts — upper wings
drawBucket(FX + 60, FY + 320, 55, 24, COL.bucket50, '50 PTS');
drawBucket(FX + FW - 115, FY + 320, 55, 24, COL.bucket50, '50 PTS');

// 25 pts — mid sides
drawBucket(FX + 35, FY + 430, 65, 24, COL.bucket25, '25 PTS');
drawBucket(FX + FW - 100, FY + 430, 65, 24, COL.bucket25, '25 PTS');

// 10 pts — wide bottom
drawBucket(FX + 25, FY + FH - 205, 95, 22, COL.bucket10, '10 PTS');
drawBucket(FX + FW - 120, FY + FH - 205, 95, 22, COL.bucket10, '10 PTS');

// ---- CENTER DIVIDER ----
ctx.setLineDash([4, 4]);
ctx.strokeStyle = COL.divider;
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(FX + FW/2, FY + FH - 35);
ctx.lineTo(FX + FW/2, warpY + warpR + 20);
ctx.stroke();
// Below warp zone to bottom
ctx.beginPath();
ctx.moveTo(FX + FW/2, warpY - warpR - 5);
ctx.lineTo(FX + FW/2, FY + FH - 200);
ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle = COL.label;
ctx.font = '7px monospace';
ctx.textAlign = 'center';
ctx.fillText('DIVIDER', FX + FW/2, FY + FH - 195);

// ---- DUAL FLIPPER ZONE ----
const flipY = FY + FH - 70;

// Zone sidebar markers
ctx.fillStyle = 'rgba(255,0,0,0.06)';
ctx.fillRect(FX + 8, flipY - 40, FW/2 - 12, 75);
ctx.fillStyle = 'rgba(0,100,255,0.06)';
ctx.fillRect(FX + FW/2 + 4, flipY - 40, FW/2 - 12, 75);

// Player 1 LEFT flipper
ctx.save();
ctx.translate(FX + FW/4 - 55, flipY);
ctx.rotate(-0.15);
ctx.fillStyle = COL.flipperP1L;
ctx.fillRect(-35, -5, 70, 10);
ctx.fillStyle = '#fff';
ctx.font = 'bold 7px monospace';
ctx.textAlign = 'center';
ctx.fillText('P1-LEFT', 0, 3);
ctx.restore();
// Ghost
ctx.save();
ctx.translate(FX + FW/4 - 55, flipY);
ctx.rotate(0.25);
ctx.globalAlpha = 0.2;
ctx.fillStyle = COL.flipperP1L;
ctx.fillRect(-35, -5, 70, 10);
ctx.globalAlpha = 1;
ctx.restore();

// Player 1 RIGHT flipper
ctx.save();
ctx.translate(FX + FW/4 + 40, flipY);
ctx.rotate(0.15);
ctx.fillStyle = COL.flipperP1R;
ctx.fillRect(-35, -5, 70, 10);
ctx.fillStyle = '#fff';
ctx.font = 'bold 7px monospace';
ctx.textAlign = 'center';
ctx.fillText('P1-RIGHT', 0, 3);
ctx.restore();
// Ghost
ctx.save();
ctx.translate(FX + FW/4 + 40, flipY);
ctx.rotate(-0.25);
ctx.globalAlpha = 0.2;
ctx.fillStyle = COL.flipperP1R;
ctx.fillRect(-35, -5, 70, 10);
ctx.globalAlpha = 1;
ctx.restore();

// Death gap P1
ctx.fillStyle = COL.deathGap;
ctx.fillRect(FX + FW/4 - 8, flipY + 8, 16, 12);
ctx.fillStyle = '#ff4444';
ctx.font = '6px monospace';
ctx.textAlign = 'center';
ctx.fillText('DEATH', FX + FW/4, flipY + 26);
ctx.fillText('GAP', FX + FW/4, flipY + 33);

// Player 2 LEFT flipper
ctx.save();
ctx.translate(FX + 3*FW/4 - 45, flipY);
ctx.rotate(-0.15);
ctx.fillStyle = COL.flipperP2L;
ctx.fillRect(-35, -5, 70, 10);
ctx.fillStyle = '#fff';
ctx.font = 'bold 7px monospace';
ctx.textAlign = 'center';
ctx.fillText('P2-LEFT', 0, 3);
ctx.restore();
// Ghost
ctx.save();
ctx.translate(FX + 3*FW/4 - 45, flipY);
ctx.rotate(0.25);
ctx.globalAlpha = 0.2;
ctx.fillStyle = COL.flipperP2L;
ctx.fillRect(-35, -5, 70, 10);
ctx.globalAlpha = 1;
ctx.restore();

// Player 2 RIGHT flipper
ctx.save();
ctx.translate(FX + 3*FW/4 + 50, flipY);
ctx.rotate(0.15);
ctx.fillStyle = COL.flipperP2R;
ctx.fillRect(-35, -5, 70, 10);
ctx.fillStyle = '#fff';
ctx.font = 'bold 7px monospace';
ctx.textAlign = 'center';
ctx.fillText('P2-RIGHT', 0, 3);
ctx.restore();
// Ghost
ctx.save();
ctx.translate(FX + 3*FW/4 + 50, flipY);
ctx.rotate(-0.25);
ctx.globalAlpha = 0.2;
ctx.fillStyle = COL.flipperP2R;
ctx.fillRect(-35, -5, 70, 10);
ctx.globalAlpha = 1;
ctx.restore();

// Death gap P2
ctx.fillStyle = COL.deathGap;
ctx.fillRect(FX + 3*FW/4 - 2, flipY + 8, 16, 12);
ctx.fillStyle = '#4488ff';
ctx.font = '6px monospace';
ctx.textAlign = 'center';
ctx.fillText('DEATH', FX + 3*FW/4 + 6, flipY + 26);
ctx.fillText('GAP', FX + 3*FW/4 + 6, flipY + 33);

// ---- BRAKE HANDLES (4 total) ----
// P1 Left brake (outer left)
ctx.fillStyle = COL.brakeHandle;
ctx.fillRect(FX - 20, flipY - 80, 14, 35);
ctx.strokeStyle = COL.brakeCable;
ctx.lineWidth = 1;
ctx.setLineDash([3,3]);
ctx.beginPath();
ctx.moveTo(FX - 13, flipY - 45);
ctx.lineTo(FX - 13, flipY - 10);
ctx.lineTo(FX + FW/4 - 90, flipY);
ctx.stroke();
ctx.setLineDash([]);

// P1 Right brake (inner left)
ctx.fillStyle = COL.brakeHandle;
ctx.fillRect(FX + FW/2 - 20, flipY - 100, 14, 35);
ctx.strokeStyle = COL.brakeCable;
ctx.setLineDash([3,3]);
ctx.beginPath();
ctx.moveTo(FX + FW/2 - 13, flipY - 65);
ctx.lineTo(FX + FW/2 - 13, flipY - 10);
ctx.lineTo(FX + FW/4 + 75, flipY);
ctx.stroke();
ctx.setLineDash([]);

// P2 Left brake (inner right)
ctx.fillStyle = COL.brakeHandle;
ctx.fillRect(FX + FW/2 + 6, flipY - 100, 14, 35);
ctx.strokeStyle = COL.brakeCable;
ctx.setLineDash([3,3]);
ctx.beginPath();
ctx.moveTo(FX + FW/2 + 13, flipY - 65);
ctx.lineTo(FX + FW/2 + 13, flipY - 10);
ctx.lineTo(FX + 3*FW/4 - 80, flipY);
ctx.stroke();
ctx.setLineDash([]);

// P2 Right brake (outer right)
ctx.fillStyle = COL.brakeHandle;
ctx.fillRect(FX + FW + 6, flipY - 80, 14, 35);
ctx.strokeStyle = COL.brakeCable;
ctx.setLineDash([3,3]);
ctx.beginPath();
ctx.moveTo(FX + FW + 13, flipY - 45);
ctx.lineTo(FX + FW + 13, flipY - 10);
ctx.lineTo(FX + 3*FW/4 + 85, flipY);
ctx.stroke();
ctx.setLineDash([]);

// Brake labels
ctx.fillStyle = COL.brakeCable;
ctx.font = '7px monospace';
ctx.textAlign = 'right';
ctx.fillText('P1 LEFT', FX - 22, flipY - 85);
ctx.fillText('SQUEEZE', FX - 22, flipY - 76);
ctx.textAlign = 'left';
ctx.fillText('P2 RIGHT', FX + FW + 22, flipY - 85);
ctx.fillText('SQUEEZE', FX + FW + 22, flipY - 76);

// ---- GUTTER ----
ctx.fillStyle = COL.gutter;
ctx.fillRect(FX + 8, FY + FH - 25, FW - 16, 18);
ctx.fillStyle = COL.label;
ctx.font = '9px monospace';
ctx.textAlign = 'center';
ctx.fillText('GUTTER / BALL RETURN TROUGH', FX + FW/2, FY + FH - 13);

// ---- BALLS IN ACTION (multiple!) ----
// Ball 1 — P1 red, cascading through spinners
const b1x = FX + 150, b1y = FY + 280;
ctx.fillStyle = COL.ball1;
ctx.shadowColor = COL.ball1; ctx.shadowBlur = 8;
ctx.beginPath(); ctx.arc(b1x, b1y, 10, 0, Math.PI*2); ctx.fill();
ctx.shadowBlur = 0;
ctx.fillStyle = '#fff';
ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
ctx.fillText('P1', b1x, b1y+3);

// Ball trail
ctx.strokeStyle = 'rgba(255,68,68,0.3)';
ctx.lineWidth = 2; ctx.setLineDash([3,3]);
ctx.beginPath();
ctx.moveTo(FX + FW/4, FY + 100);
ctx.lineTo(FX + 120, FY + 180);
ctx.lineTo(FX + 160, FY + 230);
ctx.lineTo(b1x, b1y);
ctx.stroke(); ctx.setLineDash([]);

// Ball 2 — P2 blue, near warp zone
const b2x = warpX - 35, b2y = warpY + 5;
ctx.fillStyle = COL.ball2;
ctx.shadowColor = COL.ball2; ctx.shadowBlur = 8;
ctx.beginPath(); ctx.arc(b2x, b2y, 10, 0, Math.PI*2); ctx.fill();
ctx.shadowBlur = 0;
ctx.fillStyle = '#fff';
ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
ctx.fillText('P2', b2x, b2y+3);

// Arrow showing warp trajectory
ctx.strokeStyle = COL.warpPurple;
ctx.lineWidth = 2; ctx.setLineDash([4,3]);
ctx.beginPath();
ctx.moveTo(b2x + 10, b2y);
ctx.quadraticCurveTo(warpX, warpY, warpX + 40, warpY + 40);
ctx.stroke(); ctx.setLineDash([]);
ctx.fillStyle = COL.warpPurple;
ctx.font = '8px monospace'; ctx.textAlign = 'left';
ctx.fillText('WARPING!', warpX + 45, warpY + 35);

// Ball 3 — neon green, just dropped from magazine
const b3x = FX + 3*FW/4, b3y = FY + 120;
ctx.fillStyle = COL.ballNeon;
ctx.shadowColor = COL.ballNeon; ctx.shadowBlur = 6;
ctx.beginPath(); ctx.arc(b3x, b3y, 9, 0, Math.PI*2); ctx.fill();
ctx.shadowBlur = 0;

// Ball 4 — approaching P1 flippers
const b4x = FX + FW/4 - 20, b4y = flipY - 25;
ctx.fillStyle = COL.pegOrange;
ctx.shadowColor = COL.pegOrange; ctx.shadowBlur = 6;
ctx.beginPath(); ctx.arc(b4x, b4y, 9, 0, Math.PI*2); ctx.fill();
ctx.shadowBlur = 0;

// Flipper save trajectory
ctx.strokeStyle = 'rgba(255,102,0,0.5)';
ctx.lineWidth = 2; ctx.setLineDash([5,3]);
ctx.beginPath();
ctx.moveTo(b4x, b4y);
ctx.quadraticCurveTo(b4x + 20, flipY - 80, b4x + 50, FY + 350);
ctx.stroke(); ctx.setLineDash([]);
ctx.fillStyle = COL.pegOrange;
ctx.font = '8px monospace'; ctx.textAlign = 'left';
ctx.fillText('FLIPPER SAVE!', b4x + 55, FY + 360);

// Ball 5 — in P2 peg field

  ['Cost', '~$220\u2013245'],
];

specItems.forEach((s, i) => {
  const sx = SPX + (i >= 5 ? 420 : 0);
  const sy = SPY + 16 + (i % 5) * 16;

  ctx.fillStyle = COL.pvcJoint;
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(s[0] + ':', sx, sy);

  ctx.fillStyle = COL.specs;
  ctx.font = '9px monospace';
  ctx.fillText(s[1], sx + 90, sy);
});

// ---- COMPARISON BAR ----
const CX = 30, CY = 1620;

ctx.fillStyle = COL.label;
ctx.font = 'bold 12px monospace';
ctx.textAlign = 'left';
ctx.fillText('vs. ORIGINAL FLIPPER PLINKO', CX, CY);

const comparisons = [
  { metric: 'Memorability', old: 7, new_: 10, color: COL.warpPurple },
  { metric: 'Chaos Level', old: 6, new_: 9, color: COL.spinnerYellow },
  { metric: 'Entertainment', old: 8, new_: 10, color: COL.pegGreen },
  { metric: 'Weight', old: '30', new_: '33', color: COL.dim, unit: 'lbs' },
  { metric: 'Cost', old: '$200', new_: '$225', color: COL.dim, unit: '' },
];

comparisons.forEach((comp, i) => {
  const cy = CY + 18 + i * 28;

  ctx.fillStyle = COL.label;
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(comp.metric, CX, cy);

  if (typeof comp.old === 'number') {
    // Bar chart comparison
    const barX = CX + 120;
    // Old bar
    ctx.fillStyle = '#444';
    ctx.fillRect(barX, cy - 8, comp.old * 30, 10);
    ctx.fillStyle = COL.specs;
    ctx.font = '8px monospace'; ctx.textAlign = 'right';
    ctx.fillText(comp.old + '/10', barX + comp.old * 30 + 30, cy);

    // New bar
    ctx.fillStyle = comp.color;
    ctx.globalAlpha = 0.7;
    ctx.fillRect(barX, cy + 5, comp.new_ * 30, 10);
    ctx.globalAlpha = 1;
    ctx.fillStyle = comp.color;
    ctx.font = 'bold 8px monospace'; ctx.textAlign = 'right';
    ctx.fillText(comp.new_ + '/10', barX + comp.new_ * 30 + 30, cy + 13);

    // Labels
    ctx.fillStyle = '#666';
    ctx.font = '7px monospace'; ctx.textAlign = 'left';
    ctx.fillText('OLD', barX - 25, cy);
    ctx.fillStyle = comp.color;
    ctx.fillText('NEW', barX - 25, cy + 13);
  } else {
    // Simple text comparison
    ctx.fillStyle = '#666';
    ctx.font = '9px monospace'; ctx.textAlign = 'left';
    ctx.fillText(comp.old + comp.unit + '  \u2192  ', CX + 120, cy);
    ctx.fillStyle = COL.pegGreen;
    ctx.font = 'bold 9px monospace';
    ctx.fillText(comp.new_ + comp.unit, CX + 220, cy);
  }
});

// ---- FOOTER TAGLINE ----
ctx.fillStyle = COL.warpPurple;
ctx.font = 'bold 16px monospace';
ctx.textAlign = 'center';
ctx.fillText('"The board MOVES. The board SINGS. The board CONNECTS."', 450, 1830);
ctx.fillStyle = COL.specs;
ctx.font = '11px monospace';
ctx.fillText('Same Honda Civic. Same $200 budget. Completely different game.', 450, 1855);

</script>
